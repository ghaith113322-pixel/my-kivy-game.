# 1. تنظيف شامل حتى للمجلدات المخفية
!rm -rf .buildozer/
!rm -rf bin/
!rm -f buildozer.spec

# 2. إنشاء ملف إعدادات جديد تماماً
!buildozer init

# 3. تعديل الملف بقوة "النظام" (sed) لضمان تغيير API إلى 33
!sed -i 's/android.api = 31/android.api = 33/g' buildozer.spec
!sed -i 's/android.minapi = 21/android.minapi = 24/g' buildozer.spec
!sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec

# 4. تثبيت الأدوات بنسخ متوافقة
!pip install --upgrade Cython==0.29.33 buildozer

# 5. أمر البناء النهائي مع تخطي الأسئلة
!yes | buildozer -v android debug
