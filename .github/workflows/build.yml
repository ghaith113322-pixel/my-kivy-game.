name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev openjdk-17-jdk-headless ant
          pip install --upgrade pip
          pip install --upgrade buildozer Cython==0.29.33 kivy

      - name: Build with Buildozer
        run: |
          # تنظيف جذري
          rm -rf .buildozer/
          rm -f buildozer.spec
          
          # صنع ملف الإعدادات وبرمجته تلقائياً
          buildozer init
          sed -i 's/package.name = myapp/package.name = falcon_game/g' buildozer.spec
          sed -i 's/package.domain = org.test/package.domain = org.ghaith/g' buildozer.spec
          sed -i 's/android.api = 31/android.api = 33/g' buildozer.spec
          sed -i 's/android.minapi = 21/android.minapi = 24/g' buildozer.spec
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
          
          # قبول رخص الأندرويد يدوياً قبل البدء
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          
          # التشغيل مع إجبار الموافقة (السر هنا)
          yes | buildozer -v android debug
        env:
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: bin/*.apk
